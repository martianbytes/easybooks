<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyBooks</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-inner">
        <div class="navbar-logo">
          <em>EasyBooks</em>
        </div>
        <ul class="navbar-nav">
          <li><a href="#">Browse</a></li>
          <li><a href="#">New Arrival</a></li>
          <li><a href="#">BestSellers</a></li>
          <li><a href="#">Genres</a></li>
          <li><a href="#">Authors</a></li>
          <li><a href="#">Sell</a></li>
        </ul>
        <div class="navbar-actions">
          <div class="search-bar">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input type="text" placeholder="Search books, authors..." />
          </div>
          <a class="btn-icon">
            <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none">
              <path
                d="M5.33331 6H19.8672C20.4687 6 20.9341 6.52718 20.8595 7.12403L20.1095 13.124C20.0469 13.6245 19.6215 14 19.1172 14H16.5555H9.44442H7.99998"
                stroke="#ffffff" stroke-linejoin="round" />
              <path
                d="M2 4H4.23362C4.68578 4 5.08169 4.30341 5.19924 4.74003L8.30076 16.26C8.41831 16.6966 8.81422 17 9.26638 17H19"
                stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="10" cy="20" r="1" stroke="#ffffff" stroke-linejoin="round" />
              <circle cx="17.5" cy="20" r="1" stroke="#ffffff" stroke-linejoin="round" />
            </svg>
            <span class="cart-badge">3</span>
          </a>
          <a class="btn-nav-cta">Sign In</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Browse Header -->
  <section class="browse-header">
    <div class="container">
      <div class="browse-header-inner">
        <!-- <span class="browse-eyebrow">All Books</span>
          <h1 class="browse-title">Browse our <em>collection.</em></h1>
          <p class="browse-subtitle">
            Thousands of pre-loved books waiting for their next readers. Use
            search and filter to find your perfect match.
          </p> -->
        <div class="browse-search-wrap">
          <div class="browse-search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input type="text" placeholder="Search by title, author, or ISBN" />
            <a href="#" class="btn browse-search-btn">Search</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Browse body -->
  <div class="browse-body">
    <div class="container">
      <div class="browse-layout">
        <!-- sidebar -->
        <div class="filter-sidebar-sticky">
          <div class="filter-sidebar">
            <div class="filter-sidebar-title">
              <span>Filters</span>
              <button class="filter-clear-btn">Clear all</button>
            </div>

            <div class="filter-group">
              <p class="filter-group-label">Genre</p>
              <div class="genre-pills">
                <button class="genre-pill active">All</button><button class="genre-pill">Fiction</button><button
                  class="genre-pill">Non-Fiction</button><button class="genre-pill">Mystery</button><button
                  class="genre-pill">Fantasy</button><button class="genre-pill">Biography</button><button
                  class="genre-pill">Science</button><button class="genre-pill">Motivation</button><button
                  class="genre-pill">History</button><button class="genre-pill">Romance</button><button
                  class="genre-pill">Thriller</button>
              </div>
            </div>

            <div class="filter-group">
              <p class="filter-group-label">Condition</p>
              <div class="condition-list">
                <div class="condition-item">
                  <input type="checkbox" name="cond-like-new" id="cond-like-new" checked />
                  <label for="cond-like-new">Like New</label>
                </div>
                <div class="condition-item">
                  <input type="checkbox" name="cond-good" id="cond-good" />
                  <label for="cond-good">Good</label>
                </div>
                <div class="condition-item">
                  <input type="checkbox" name="cond-fair" id="cond-fair" />
                  <label for="cond-fair">Fair</label>
                </div>
                <div class="condition-item">
                  <input type="checkbox" name="cond-acceptable" id="cond-acceptable" />
                  <label for="cond-acceptable">Acceptable</label>
                </div>
              </div>
            </div>

            <div class="filter-group">
              <p class="filter-group-label">Availability</p>
              <div class="condition-list">
                <div class="condition-item"><input type="checkbox" name="avail-in-stock" id="avail-in-stock"><label
                    for="avail-in-stock">In Stock</label></input></div>
                <div class="condition-item"><input type="checkbox" name="avail-pre-order" id="avail-pre-order"><label
                    for="avail-in-order">Pre-Order</label></input></div>
              </div>
            </div>

            <div class="filter-group">
              <p class="filter-group-label">Language</p>
              <div class="genre-pills">
                <button class="genre-pill active">English</button>
                <button class="genre-pill">Nepali</button>
                <button class="genre-pill">Hindi</button>
                <button class="genre-pill">Other</button>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Book Grid -->
   
</body>

</html>
