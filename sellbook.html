<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sell Book | EasyBooks</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NAVBAR (same as homepage) -->
    <nav class="navbar">
      <div class="container">
        <div class="navbar-inner">
          <div class="navbar-logo">
            <a href="./index.html" class="nav-logo-link"><em>Easy<span>Books</span></em></a>
          </div>
          <ul class="navbar-nav">
            <li><a href="./browse.html">Browse</a></li>
            <li><a href="#">New Arrival</a></li>
            <li><a href="#">BestSellers</a></li>
            <li><a href="#">Genres</a></li>
            <li><a href="#">Authors</a></li>
            <li><a href="sellbook.html">Sell</a></li>
          </ul>
          <div class="navbar-actions">
            <div class="search-bar">
              <svg
                class="search-icon"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
              <input type="text" placeholder="Search books, authors..." />
            </div>
            <a class="cart-btn-icon">
              <svg width="20px" height="20px" viewBox="0 0 24 24" fill="none">
                  <path
                    d="M5.33331 6H19.8672C20.4687 6 20.9341 6.52718 20.8595 7.12403L20.1095 13.124C20.0469 13.6245 19.6215 14 19.1172 14H16.5555H9.44442H7.99998"
                    stroke="#ffffff"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M2 4H4.23362C4.68578 4 5.08169 4.30341 5.19924 4.74003L8.30076 16.26C8.41831 16.6966 8.81422 17 9.26638 17H19"
                    stroke="#ffffff"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="10"
                    cy="20"
                    r="1"
                    stroke="#ffffff"
                    stroke-linejoin="round"
                  />
                  <circle
                    cx="17.5"
                    cy="20"
                    r="1"
                    stroke="#ffffff"
                    stroke-linejoin="round"
                  />
              </svg>
              <!-- <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
              </svg> -->
              <span class="cart-badge">3</span>
            </a>
            <a class="btn-nav-cta">Sign In</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- PAGE HEADER -->
    <section class="sell-header">
      <div class="container">
        <div class="sell-header-inner">
          <h1 class="sell-title">Sell Your Book</h1>
          <p class="sell-subtitle">
            List your used book and help other readers discover great reads at
            affordable prices.
          </p>
        </div>
      </div>
    </section>

    <!-- SELL BOOK FORM -->
    <section class="sell-form-section">
      <div class="container">
        <div class="sell-form-card">
          <form class="sell-form">

            <div class="form-group">
              <label>Book Title</label>
              <input type="text" placeholder="Enter book title" />
            </div>

            
            <div class="form-group">
              <label>Author Name</label>
              <input type="text" placeholder="Enter author name" />
            </div>

            
            <div class="form-group">
              <label>Category</label>
              <select>
                <option>Select category</option>
                <option>Fiction</option>
                <option>Fantasy</option>
                <option>Motivation</option>
                <option>Biography</option>
                <option>Technology</option>
              </select>
            </div>

            
            <div class="form-group">
              <label>Book Condition</label>
              <select>
                <option>Select condition</option>
                <option>New</option>
                <option>Like New</option>
                <option>Good</option>
                <option>Acceptable</option>
              </select>
            </div>

            
            <div class="form-group">
              <label>Price (Rs)</label>
              <input type="number" placeholder="Enter price" />
            </div>

            
            <div class="form-group">
              <label>Contact Email / Phone</label>
              <input type="text" placeholder="Enter contact information" />
            </div>

            
            <div class="form-group">
              <label>Upload Book Image</label>
              <input type="file" />
            </div>

            
            <div class="form-group full">
              <label>Description</label>
              <textarea
                placeholder="Write short description about the book"
              ></textarea>
            </div>

            
            <div class="form-actions">
              <button class="btn btn-submit">Submit Book</button>
              <button type="reset" class="btn btn-cancel">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
